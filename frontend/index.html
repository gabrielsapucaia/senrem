<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENREM3</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header id="app-header">
        <h1>SENREM3</h1>
        <span class="subtitle">Sensoriamento Remoto para Mineracao</span>
    </header>

    <div id="app-container">
        <aside id="sidebar">
            <section id="layers-panel">
                <h2>Layers</h2>
                <div id="layers-list"></div>
            </section>

            <section id="weights-panel">
                <h2>Pesos</h2>
                <div id="weights-list"></div>
                <button id="btn-generate-targets" disabled>Gerar Alvos</button>
            </section>
        </aside>

        <aside id="properties-panel">
            <div id="props-header">
                <h2 id="props-layer-name">Propriedades</h2>
            </div>
            <div id="props-empty">
                <p>Selecione uma layer ativa para ajustar</p>
            </div>
            <div id="props-content" style="display:none">
                <div class="prop-group">
                    <label>Opacidade</label>
                    <input type="range" id="prop-opacity" min="0" max="100" value="70" step="1">
                    <span class="prop-value" id="prop-opacity-val">70%</span>
                </div>
                <div class="prop-group">
                    <label>Brilho</label>
                    <input type="range" id="prop-brightness" min="0" max="100" value="100" step="1">
                    <span class="prop-value" id="prop-brightness-val">1.00</span>
                </div>
                <div class="prop-group">
                    <label>Contraste</label>
                    <input type="range" id="prop-contrast" min="-100" max="100" value="0" step="1">
                    <span class="prop-value" id="prop-contrast-val">0.00</span>
                </div>
                <div class="prop-group">
                    <label>Saturacao</label>
                    <input type="range" id="prop-saturation" min="-100" max="100" value="0" step="1">
                    <span class="prop-value" id="prop-saturation-val">0.00</span>
                </div>
                <div id="props-local-controls" style="display:none">
                    <div class="prop-group">
                        <label>Colormap</label>
                        <select id="prop-colormap">
                            <option value="viridis">Viridis</option>
                            <option value="magma">Magma</option>
                            <option value="plasma">Plasma</option>
                            <option value="inferno">Inferno</option>
                            <option value="turbo">Turbo</option>
                            <option value="cividis">Cividis</option>
                            <option value="greys">Greys</option>
                        </select>
                    </div>
                    <div class="prop-group">
                        <label>Corte</label>
                        <div class="range-slider" id="range-slider-cut">
                            <div class="range-track"></div>
                            <div class="range-fill"></div>
                            <div class="range-handle range-handle-min" data-handle="min"></div>
                            <div class="range-handle range-handle-max" data-handle="max"></div>
                        </div>
                        <span class="prop-value" id="prop-vrange-val">0.00 — 10.00</span>
                    </div>
                </div>
            </div>
        </aside>

        <main id="map-container">
            <div id="map"></div>
        </main>
    </div>

    <footer id="status-bar">
        <span id="status-text">Carregando...</span>
        <span id="cursor-coords"></span>
    </footer>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script src="/app.js"></script>
</body>
</html>
